name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: mcp-ssh-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: mcp-ssh-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: mcp-ssh-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: mcp-ssh-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: mcp-ssh-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - shell: bash
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cargo install cross --locked
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - shell: bash
        run: |
          cp target/${{ matrix.target }}/release/mcp-ssh* ${{ matrix.asset }}
          sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
